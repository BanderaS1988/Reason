<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f2f0ec;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Inter',system-ui,sans-serif}
.widget{background:#fff;border-radius:12px;border:1px solid #e8e4dc;padding:18px 20px;width:300px;overflow:hidden}
.s-title{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#9e9890;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #e8e4dc;display:flex;align-items:center;gap:6px}
.space-container{width:100%;height:160px;border-radius:10px;overflow:hidden;position:relative;margin-bottom:12px;background:#0a0a1a;cursor:grab}
.space-container:active{cursor:grabbing}
canvas#space{display:block;width:100%;height:100%}
.zoom-btn{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:7px;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;z-index:10}
.zoom-btn:hover{background:rgba(0,0,0,.6)}
.load-indicator{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,.5);font-size:11px;gap:8px;pointer-events:none}
.spinner{width:24px;height:24px;border:2px solid rgba(255,255,255,.15);border-top-color:rgba(255,255,255,.6);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.space-expanded{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0);pointer-events:none;transition:background .4s}
.space-expanded.open{background:rgba(0,0,0,.75);pointer-events:auto}
.space-expanded-inner{width:80vw;max-width:700px;height:480px;border-radius:16px;overflow:hidden;position:relative;transform:scale(0.15);opacity:0;transition:transform .45s cubic-bezier(.4,0,.2,1),opacity .35s ease;background:#0a0a1a}
.space-expanded.open .space-expanded-inner{transform:scale(1);opacity:1}
canvas#spaceExp{display:block;width:100%;height:100%;cursor:grab}
canvas#spaceExp:active{cursor:grabbing}
.close-expand{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.forecast-grid{display:flex;gap:5px;margin-top:4px}
.fc-day{flex:1;text-align:center;padding:8px 4px;background:#f2f0ec;border-radius:7px;border:1px solid #e8e4dc}
.fc-name{font-size:8px;color:#9e9890;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.fc-ico{font-size:18px;line-height:1;margin-bottom:3px}
.fc-temp{font-size:12px;font-weight:700;color:#1a1814;font-family:monospace}
.cb-row{display:flex;align-items:center;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid #e8e4dc}
.cb-row input[type=checkbox]{width:15px;height:15px;accent-color:#c8102e;cursor:pointer;flex-shrink:0}
.cb-row label{font-size:11px;color:#706b62;cursor:pointer;user-select:none}
</style>
</head>
<body>
<div class="widget">
  <div class="s-title">🌦 Időjárás – <span style="margin-left:3px">Siófok</span></div>

  <div class="space-container" id="spaceWrap">
    <canvas id="space"></canvas>
    <div class="load-indicator" id="loadIndicator">
      <div class="spinner"></div>
      <span>Modell betöltése...</span>
    </div>
    <button class="zoom-btn" id="zoomBtn" title="Nagyítás">⛶</button>
  </div>

  <div class="forecast-grid">
    <div class="fc-day"><div class="fc-name">Pén</div><div class="fc-ico">🌧</div><div class="fc-temp">15°</div></div>
    <div class="fc-day"><div class="fc-name">Szo</div><div class="fc-ico">🌧</div><div class="fc-temp">11°</div></div>
    <div class="fc-day"><div class="fc-name">Vas</div><div class="fc-ico">⛅</div><div class="fc-temp">13°</div></div>
    <div class="fc-day"><div class="fc-name">Hét</div><div class="fc-ico">🌤</div><div class="fc-temp">14°</div></div>
    <div class="fc-day"><div class="fc-name">Kedd</div><div class="fc-ico">⛅</div><div class="fc-temp">16°</div></div>
  </div>

  <div class="cb-row">
    <input type="checkbox" id="widgetCheck">
    <label for="widgetCheck">Értesítések bekapcsolva erre a widgetre</label>
  </div>
</div>

<!-- Expanded overlay -->
<div class="space-expanded" id="overlay">
  <div class="space-expanded-inner" id="expandInner">
    <canvas id="spaceExp"></canvas>
    <button class="close-expand" id="closeExpand">✕</button>
  </div>
</div>

<!-- Three.js + GLTFLoader CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── GLB URL – csak ezt az egy sort kell cserélni ──
// Töltsd fel a csavo.glb fájlt a GitHub repóba, majd írd be a raw URL-t:
// pl. "https://raw.githubusercontent.com/FELHASZNALONEV/REPO/main/csavo.glb"
const MODEL_URL = "https://raw.githubusercontent.com/BanderaS1988/Reason/main/csavo.glb";

// ── GLTFLoader inline (r128 compatible) ──
// Betöltjük a GLTFLoader-t a CDN-ről
(function loadGLTFLoader(cb){
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  s.onload = cb;
  s.onerror = () => { console.warn('GLTFLoader CDN failed'); cb(); };
  document.head.appendChild(s);
})(init);

function makeScene(canvas, width, height) {
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setSize(width, height);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.shadowMap.enabled = true;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);

  const camera = new THREE.PerspectiveCamera(45, width / height, 0.01, 100);
  camera.position.set(0, 1.2, 2.8);

  // Lights
  const amb = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(amb);
  const dir = new THREE.DirectionalLight(0xffffff, 1.2);
  dir.position.set(2, 4, 3);
  dir.castShadow = true;
  scene.add(dir);
  const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
  fill.position.set(-2, 1, -2);
  scene.add(fill);

  return { renderer, scene, camera };
}

let sharedMixer = null, sharedModel = null, sharedClip = null;
let smallScene, smallRenderer, smallCamera;
let bigScene, bigRenderer, bigCamera;
let smallOrbit = { isDragging:false, prevX:0, prevY:0, rotX:0, rotY:0 };
let bigOrbit   = { isDragging:false, prevX:0, prevY:0, rotX:0, rotY:0 };
let clock = new THREE.Clock();
let expandOpen = false;

function init() {
  const cSmall = document.getElementById('space');
  const wrap = document.getElementById('spaceWrap');
  const W = wrap.offsetWidth, H = wrap.offsetHeight;
  cSmall.width = W; cSmall.height = H;

  const s = makeScene(cSmall, W, H);
  smallScene = s.scene; smallRenderer = s.renderer; smallCamera = s.camera;

  const cBig = document.getElementById('spaceExp');
  const inner = document.getElementById('expandInner');
  cBig.width = inner.offsetWidth || 700; cBig.height = inner.offsetHeight || 480;
  const b = makeScene(cBig, cBig.width, cBig.height);
  bigScene = b.scene; bigRenderer = b.renderer; bigCamera = b.camera;

  if (typeof THREE.GLTFLoader !== 'undefined') {
    const loader = new THREE.GLTFLoader();
    loader.load(
      MODEL_URL,
      (gltf) => {
        const model = gltf.scene;

        // Auto-center & scale
        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3(); box.getSize(size);
        const center = new THREE.Vector3(); box.getCenter(center);
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 1.8 / maxDim;
        model.scale.setScalar(scale);
        model.position.sub(center.multiplyScalar(scale));
        model.position.y -= size.y * scale * 0.3;

        // Clone for big scene
        const model2 = model.clone(true);

        smallScene.add(model);
        bigScene.add(model2);

        sharedModel = model;

        // Animation
        if (gltf.animations && gltf.animations.length) {
          sharedMixer = new THREE.AnimationMixer(model);
          const clip = gltf.animations[0];
          sharedMixer.clipAction(clip).play();

          const mixer2 = new THREE.AnimationMixer(model2);
          mixer2.clipAction(clip).play();
          model2.userData.mixer = mixer2;
        }

        document.getElementById('loadIndicator').style.display = 'none';
      },
      (xhr) => {
        const pct = xhr.lengthComputable ? Math.round(xhr.loaded/xhr.total*100) : '...';
        const el = document.getElementById('loadIndicator');
        if (el) el.querySelector('span').textContent = `Betöltés: ${pct}%`;
      },
      (err) => {
        const el = document.getElementById('loadIndicator');
        if (el) { el.querySelector('.spinner').style.display='none'; el.querySelector('span').textContent = '⚠ Modell nem elérhető'; }
        console.error('GLB load error:', err);
      }
    );
  } else {
    const el = document.getElementById('loadIndicator');
    if (el) { el.querySelector('.spinner').style.display='none'; el.querySelector('span').textContent = 'GLTFLoader hiba'; }
  }

  setupOrbit(cSmall, smallOrbit, smallScene);
  setupOrbit(document.getElementById('spaceExp'), bigOrbit, bigScene);

  animate();
}

function setupOrbit(canvas, state, scene) {
  canvas.addEventListener('mousedown', e => { state.isDragging=true; state.prevX=e.clientX; state.prevY=e.clientY; });
  window.addEventListener('mouseup', () => { state.isDragging=false; });
  canvas.addEventListener('mousemove', e => {
    if (!state.isDragging) return;
    const dx = e.clientX - state.prevX, dy = e.clientY - state.prevY;
    state.prevX=e.clientX; state.prevY=e.clientY;
    state.rotY += dx * 0.008; state.rotX += dy * 0.008;
    state.rotX = Math.max(-1.2, Math.min(1.2, state.rotX));
    applyOrbit(scene, state);
  });
  // Touch
  canvas.addEventListener('touchstart', e => { const t=e.touches[0]; state.isDragging=true; state.prevX=t.clientX; state.prevY=t.clientY; });
  canvas.addEventListener('touchend', () => { state.isDragging=false; });
  canvas.addEventListener('touchmove', e => {
    if (!state.isDragging) return;
    const t=e.touches[0];
    const dx=t.clientX-state.prevX, dy=t.clientY-state.prevY;
    state.prevX=t.clientX; state.prevY=t.clientY;
    state.rotY+=dx*0.008; state.rotX+=dy*0.008;
    state.rotX=Math.max(-1.2,Math.min(1.2,state.rotX));
    applyOrbit(scene, state);
  });
}

function applyOrbit(scene, state) {
  scene.children.forEach(obj => {
    if (obj.isGroup || (obj.isMesh) || obj.type === 'Object3D') {
      if (obj.isLight || obj.isCamera) return;
    }
  });
  // Rotate all loaded models in scene
  scene.traverse(obj => {
    if (obj.userData && obj.userData.isModelRoot) {
      obj.rotation.y = state.rotY;
      obj.rotation.x = state.rotX;
    }
  });
  // Simpler: rotate the pivot group
  if (scene._pivot) {
    scene._pivot.rotation.y = state.rotY;
    scene._pivot.rotation.x = state.rotX;
  }
}

// Wrap models in pivot groups for rotation
function wrapInPivot(scene, model) {
  const pivot = new THREE.Group();
  pivot.userData.isModelRoot = true;
  scene._pivot = pivot;
  model.parent && model.parent.remove(model);
  pivot.add(model);
  scene.add(pivot);
  return pivot;
}

// Override init loader success to wrap in pivot
const _origInit = init;

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  if (sharedMixer) sharedMixer.update(delta);
  // Update big scene mixers
  if (bigScene) bigScene.traverse(obj => { if (obj.userData && obj.userData.mixer) obj.userData.mixer.update(delta); });

  smallRenderer.render(smallScene, smallCamera);
  if (expandOpen) bigRenderer.render(bigScene, bigCamera);
}

// Zoom
document.getElementById('zoomBtn').addEventListener('click', () => {
  const overlay = document.getElementById('overlay');
  overlay.classList.add('open');
  expandOpen = true;
  const inner = document.getElementById('expandInner');
  const cBig = document.getElementById('spaceExp');
  setTimeout(() => {
    const W2 = inner.offsetWidth, H2 = inner.offsetHeight;
    if (W2 > 0 && H2 > 0) { bigRenderer.setSize(W2, H2); bigCamera.aspect = W2/H2; bigCamera.updateProjectionMatrix(); }
  }, 50);
});
document.getElementById('closeExpand').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('open');
  expandOpen = false;
});
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
    expandOpen = false;
  }
});
</script>
</body>
</html>
